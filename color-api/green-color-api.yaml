apiVersion: v1
kind: Pod
metadata:
  name: green-color-api
  labels:
    app: green-color-api
spec:
  containers:
    - name: color-api
      image: maximr2001/color-api:1.3.0
      ports:
        - containerPort: 80
      env:
        - name: COLOR_CONFIG_PATH
          valueFrom:
            configMapKeyRef:
              name: green-config
              key: color_config_path
      volumeMounts:
        - name: color-config
          mountPath: /mount/config
  
  volumes:
    - name: color-config
      configMap:
        name: green-config