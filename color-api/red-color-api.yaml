apiVersion: v1
kind: Pod
metadata:
  name: red-color-api
  labels:
    app: color-api
spec:
  containers:
    - name: color-api
      image: maximr2001/color-api:1.3.0
      imagePullPolicy: Always
      ports:
        - containerPort: 80
      envFrom:
        - configMapRef:
            name: red-config


      env:
        - name: DEFAULT_COLOR
          valueFrom:
            configMapKeyRef:
              name: red-config
              key: color