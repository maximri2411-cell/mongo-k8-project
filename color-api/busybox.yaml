apiVersion: v1
kind: Pod
metadata:
  name: busybox
spec:
  containers:
    - name: busybox
      image: busybox:1.36.1
      command:
        - sh
        - -c
        - sleep 1800
      volumeMounts:
        - name: db-secrets
          mountPath: /etc/db
          
  volumes:
    - name: db-secrets
      secret:
        secretName: db-creds